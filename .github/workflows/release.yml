# Build release binary and publish to GitHub Releases (unsigned).
# https://docs.github.com/en/repositories/releasing-projects-on-github/about-releases
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: m4-macos
  cancel-in-progress: false

jobs:
  release:
    runs-on: [self-hosted, macOS, ARM64, m4-homelab]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Verify bundled catalog fingerprint
        run: python3 Scripts/verify_bundled_catalog.py

      - name: Build and publish release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          swift build -c release
          ARCH=$(uname -m)
          BIN="MisterRogersRenamer-macos-${ARCH}"
          cp ".build/release/MisterRogersRenamer" "${BIN}"
          chmod +x "${BIN}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${BIN}" --clobber
          else
            NOTES_FILE="$(mktemp)"
            trap 'rm -f "${NOTES_FILE}"' EXIT
            if python3 Scripts/compose_github_release_notes.py \
              --tag "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" > "${NOTES_FILE}"; then
              gh release create "${TAG}" \
                --verify-tag \
                --title "${TAG}" \
                --notes-file "${NOTES_FILE}" \
                "${BIN}"
            else
              echo "::warning::compose_github_release_notes.py failed — falling back to --generate-notes." >&2
              gh release create "${TAG}" --verify-tag --title "${TAG}" --generate-notes "${BIN}"
            fi
          fi
